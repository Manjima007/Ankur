<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANKUR Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Segoe UI, Tahoma, sans-serif;
        background: linear-gradient(145deg, #fae8ea, #fdf5ee);
        color: #8f1822;
      }
      .card {
        width: min(92vw, 520px);
        background: #ffffff;
        border: 1px solid #f3c5ca;
        border-radius: 16px;
        box-shadow: 0 16px 48px rgba(157, 23, 32, 0.15);
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #6f3036;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        ANKUR could not load this page right now. Please check your internet connection and try again.
      </p>
    </main>
  </body>
</html>
