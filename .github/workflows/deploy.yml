name: Deploy ANKUR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'Ankur_backend/**'
            frontend:
              - 'ankur-frontend/**'

  quality-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r Ankur_backend/requirements.txt

      - name: Backend syntax check
        if: needs.changes.outputs.backend == 'true'
        run: python -m compileall Ankur_backend

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ankur-frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ankur-frontend
        run: npm ci

      - name: Frontend production build
        if: needs.changes.outputs.frontend == 'true'
        working-directory: ankur-frontend
        run: npm run build

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [changes, quality-check]
    if: needs.changes.outputs.frontend == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL is missing. Skipping Vercel deploy hook."
            exit 0
          fi
          if ! curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"; then
            echo "::warning::Vercel deploy hook request failed, but the workflow will continue."
          fi
