name: Backend Deploy (SSH)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Ankur/Ankur_backend
            git pull origin main
            pm2 restart ankur-backend || pm2 start ./venv/bin/python3 --name "ankur-backend" -- -m uvicorn main:app --host 127.0.0.1 --port 8000
