name: Backend Deploy (SSH)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Connect to your private Tailscale network
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. Deploy and Force Update
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m # Gives the connection more time to establish
         script: |
            cd ~/Ankur/Ankur_backend
            
            # 1. Clean and Update code (This worked!)
            git clean -fd
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Find PM2 and Restart
            # We use 'command -v' to find the exact path automatically
            PM2_PATH=$(command -v pm2 || which pm2 || echo "/home/${{ secrets.SERVER_USER }}/.npm-global/bin/pm2")
            
            echo "Using PM2 at: $PM2_PATH"
            $PM2_PATH restart Ankur_Production || $PM2_PATH restart all
