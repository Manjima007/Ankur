name: Backend Deploy (SSH)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Connect to your private Tailscale network
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. Deploy and Force Update
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m # Gives the connection more time to establish
          script: |
            cd ~/Ankur/Ankur_backend
            
            # Clean up server-side conflicts
            git clean -fd
            git fetch origin main
            git reset --hard origin/main
            
            # Restart the app
            export PATH=$PATH:/home/${{ secrets.SERVER_USER }}/.npm-global/bin
            pm2 restart Ankur_Production || ~/.npm-global/bin/pm2 restart Ankur_Production || pm2 restart all
