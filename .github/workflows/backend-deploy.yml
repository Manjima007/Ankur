name: Backend Deploy (SSH)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Ankur/Ankur_backend
            
            # 1. Force update the code (The Refactor)
            git clean -fd
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Add NVM's Node and PM2 paths to the session
            # This ensures PM2 can find the 'node' command
            export NVM_DIR="/home/strucker/.nvm"
            export PATH="$NVM_DIR/versions/node/v20.20.2/bin:$PATH"
            
            # 3. Restart the app using the direct path
            /home/strucker/.nvm/versions/node/v20.20.2/bin/pm2 restart Ankur_Production || /home/strucker/.nvm/versions/node/v20.20.2/bin/pm2 restart all